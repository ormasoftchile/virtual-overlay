name: Update Scoop Manifest

on:
  release:
    types: [published]

jobs:
  update-scoop:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        ref: main

    - name: Update Scoop manifest
      shell: pwsh
      run: |
        $version = "${{ github.event.release.tag_name }}".TrimStart('v')
        $url = "https://github.com/ormasoftchile/virtual-overlay/releases/download/${{ github.event.release.tag_name }}/VirtualOverlay-portable.zip"

        # Download the zip to compute hash
        $tempFile = [System.IO.Path]::GetTempFileName()
        Invoke-WebRequest -Uri $url -OutFile $tempFile
        $hash = (Get-FileHash -Path $tempFile -Algorithm SHA256).Hash.ToLower()
        Remove-Item $tempFile

        # Update manifest
        $manifest = Get-Content scoop/virtual-overlay.json | ConvertFrom-Json
        $manifest.version = $version
        $manifest.architecture.'64bit'.url = $url
        $manifest.architecture.'64bit'.hash = $hash
        $manifest | ConvertTo-Json -Depth 10 | Set-Content scoop/virtual-overlay.json

    - name: Commit and push
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add scoop/virtual-overlay.json
        git diff --cached --quiet || git commit -m "chore: update scoop manifest for ${{ github.event.release.tag_name }}"
        git push
